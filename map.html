<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Map | Mustafa Hasan</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <script src="script.js" defer></script>

  <style>
    .map-card {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      margin-top: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    #map-container {
      width: 100%;
      height: 500px;
      border-radius: 15px;
      overflow: hidden;
      margin-top: 1.5rem;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .map-buttons {
      margin-top: 1rem;
    }

    .map-buttons button {
      margin: 0.5rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: #1a2a6c;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .map-buttons button:hover {
      background: #ff7675;
    }
  </style>
</head>

<body>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">About Me</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="map.html">Map</a></li>
    </ul>
  </nav>

  <div class="main-container">
    <section class="map-card">
      <h1>My Locations</h1>
      <p>Places connected to my academic and professional journey.</p>

      <div id="map-container">
  <iframe 
    id="map-frame"
    src="https://www.google.com/maps?q=Illinois+Institute+of+Technology&output=embed"
    loading="lazy">
  </iframe>
</div>

<div class="map-buttons">
  <button onclick="changeLocation('iit')">IIT</button>
  <button onclick="changeLocation('downtown')">Downtown Chicago</button>
  <button onclick="changeLocation('campus')">Campus Area</button>
</div>

    </section>
  </div>
</body>
</html>
