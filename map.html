<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Map | Mustafa Hasan</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <script src="css/js/script.js" defer></script>
  <style>
    .map-card {
      background: white;
      padding: 2rem;
      border-radius: 20px;
      margin-top: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    #map-container {
      width: 100%;
      height: 500px;
      border-radius: 15px;
      overflow: hidden;
      margin-top: 1.5rem;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .map-buttons {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .map-buttons button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: #1a2a6c;
      color: white;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.3s ease, transform 0.2s;
    }
    .map-buttons button:hover {
      background: #ff7675;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">About Me</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="map.html">Map</a></li>
    </ul>
  </nav>
  <div class="main-container">
    <section class="map-card">
      <h1>My Locations</h1>
      <p>Places connected to my academic and professional journey.</p>

      <div id="map-container">
        <iframe 
          id="map-frame" 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2972.333830784227!2d-87.6294711!3d41.8347062!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x880e2c694a5e3f31%3A0xc3b836c968270591!2sIllinois%20Institute%20of%20Technology!5e0!3m2!1sen!2sus!4v1710000000000" 
          allowfullscreen="" 
          loading="lazy">
        </iframe>
      </div>
      <div class="map-buttons">
        <button onclick="changeLocation('iit')">IIT</button>
        <button onclick="changeLocation('downtown')">Downtown Chicago</button>
        <button onclick="changeLocation('campus')">Campus Area</button>
      </div>
    </section>
  </div>
</body>
</html>
